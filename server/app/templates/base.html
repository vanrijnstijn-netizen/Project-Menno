<!doctype html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Monitoring Dashboard{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #1f2937;
            color: white;
            padding: 14px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .topbar-inner {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px 20px;
        }
        .topbar-title {
            font-size: 20px;
            font-weight: bold;
        }
        .topbar-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .topbar-links a, .topbar-links span {
            color: white;
            text-decoration: none;
            background: #374151;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .topbar-links a:hover {
            background: #4b5563;
        }
        .container {
            padding: 24px;
        }
        .card, .plot-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .plot {
            width: 100%;
            height: 420px;
        }
        .table-wrapper {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: auto;
            max-height: 420px;
            border: 1px solid #d8dee8;
            margin-top: 18px;
        }
        table {
            width: 100%;
            min-width: 1500px;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }
        th {
            background: #2f3b52;
            color: white;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tr:hover {
            background: #f1f5f9;
        }
        .agent-block {
            margin-bottom: 28px;
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            margin-bottom: 10px;
        }
        .agent-header:hover {
            background: #f8fafc;
        }
        .agent-title {
            display: flex;
            flex-direction: column;
        }
        .agent-subtitle {
            font-size: 13px;
            color: #666;
        }
        .agent-toggle {
            font-size: 20px;
            font-weight: bold;
            color: #2f3b52;
            min-width: 20px;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 20px;
            align-items: center;
            margin-bottom: 12px;
        }
        .agent-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-top: 10px;
        }
        .agent-selector label {
            background: #eef2f7;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            user-select: none;
        }
        button {
            background: #2f3b52;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px 14px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #1f2937;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <div class="topbar-title">Menno's Monitoring Dashboard</div>
            <div class="topbar-links">
                {% if user %}
                    <a href="/">Data</a>
                    <a href="/cpu">CPU</a>
                    <a href="/ram">RAM</a>
                    <a href="/storage">Storage</a>
                    <span>{{ user.name or user.email }}</span>
                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login met Amazon</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
